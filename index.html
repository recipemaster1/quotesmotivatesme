<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quotesmotivatesme - Toolkit</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            background-color: #f9f9f9;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #222;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .brand {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #007bff;
            margin-bottom: 30px;
            display: block;
            text-align: center;
        }

        #quote {
            font-size: 1.8rem;
            font-weight: bold;
            line-height: 1.3;
            margin-bottom: 10px;
            text-align: center;
        }

        #author {
            display: block;
            text-align: center;
            font-style: italic;
            color: #777;
            margin-bottom: 40px;
        }

        .social-box {
            background: #f1f3f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
            border-left: 4px solid #007bff;
        }

        .label {
            font-weight: bold;
            color: #007bff;
            display: block;
            margin-bottom: 5px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: 1px solid #222;
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #222;
            color: white;
        }

        .copy-all-btn {
            background: #007bff;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="brand">Quotesmotivatesme</span>
        
        <div id="quote">"The only way to do great work is to love what you do."</div>
        <span id="author">Steve Jobs</span>

        <div class="social-box">
            <span class="label">Instagram Caption & Hashtags:</span>
            <div id="caption-area">
                Loading your caption...
            </div>
            
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #ddd;">
            
            <span class="label">Recommended Song:</span>
            <div id="song-area">
                Loading song...
            </div>
        </div>

        <div class="buttons">
            <button onclick="generateNew()">NEW POST IDEA</button>
            <button class="copy-all-btn" onclick="copyEverything()">COPY FULL CAPTION</button>
        </div>
    </div>

    <script>
        const myQuotes = [
            { q: "Believe you can and you're halfway there.", a: "Theodore Roosevelt", song: "Unstoppable - Sia" },
            { q: "It always seems impossible until it's done.", a: "Nelson Mandela", song: "Hall of Fame - The Script" },
            { q: "Everything you've ever wanted is on the other side of fear.", a: "George Addair", song: "Not Afraid - Eminem" },
            { q: "Don't stop when you're tired. Stop when you're done.", a: "Unknown", song: "Eye of the Tiger - Survivor" },
            { q: "Your time is limited, so don't waste it living someone else's life.", a: "Steve Jobs", song: "It's My Life - Bon Jovi" },
            { q: "The journey of a thousand miles begins with a single step.", a: "Lao Tzu", song: "Walking On Sunshine - Katrina & The Waves" },
            { q: "Success is not final, failure is not fatal.", a: "Winston Churchill", song: "Stronger - Kelly Clarkson" }
        ];

        const hashtags = "\n\n#Quotesmotivatesme #MindsetMatters #GrowthMindset #DailyInspiration #SuccessQuotes #Motivation2026 #DreamBig";

        function generateNew() {
            const randomIndex = Math.floor(Math.random() * myQuotes.length);
            const item = myQuotes[randomIndex];

            // 1. Update Main Quote
            document.getElementById('quote').innerText = `"${item.q}"`;
            document.getElementById('author').innerText = item.a;

            // 2. Update Caption
            const caption = `✨ ${item.q}\n\nTag someone who needs to see this! 👇\n\nFollow @Quotesmotivatesme for your daily dose of power.${hashtags}`;
            document.getElementById('caption-area').innerText = caption;

            // 3. Update Song
            document.getElementById('song-area').innerText = `🎵 Suggested Audio: ${item.song}`;
        }

        function copyEverything() {
            const caption = document.getElementById('caption-area').innerText;
            navigator.clipboard.writeText(caption);
            
            const btn = document.querySelector('.copy-all-btn');
            btn.innerText = "COPIED TO CLIPBOARD!";
            setTimeout(() => { btn.innerText = "COPY FULL CAPTION"; }, 2000);
        }

        // Run once on load
        generateNew();
    </script>
</body>
</html>
