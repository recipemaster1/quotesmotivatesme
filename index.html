<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quotesmotivatesme | Nature & Peace</title>
    <style>
        /* CSS: Soft Nature Aesthetic */
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            background-color: #f0f2f0; /* Very soft sage grey */
            background-image: linear-gradient(180deg, #f0f2f0 0%, #e0eadd 100%);
            font-family: 'Georgia', serif;
            color: #2f3e46;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9); /* Slight transparency */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid #d8e2dc;
        }

        .brand {
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #6b705c;
            margin-bottom: 30px;
            display: block;
            text-align: center;
        }

        #quote {
            font-size: 1.7rem;
            line-height: 1.5;
            margin-bottom: 15px;
            text-align: center;
            font-style: italic;
        }

        #author {
            display: block;
            text-align: center;
            font-size: 0.9rem;
            color: #a5a58d;
            margin-bottom: 40px;
        }

        .social-box {
            background: #f8f9f1;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            font-family: sans-serif;
            font-size: 0.9rem;
            border: 1px dashed #b7b7a4;
        }

        .label {
            font-weight: bold;
            color: #6b705c;
            display: block;
            margin-bottom: 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: 1px solid #6b705c;
            background: white;
            cursor: pointer;
            color: #6b705c;
            border-radius: 50px; /* Rounded pill buttons */
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #6b705c;
            color: white;
        }

        .copy-all-btn {
            background: #6b705c;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="brand">Quotesmotivatesme</span>
        
        <div id="quote">"Nature does not hurry, yet everything is accomplished."</div>
        <span id="author">Lao Tzu</span>

        <div class="social-box">
            <span class="label">Instagram Caption:</span>
            <div id="caption-area">Loading...</div>
            
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            
            <span class="label">Peaceful Audio Suggestion:</span>
            <div id="song-area" style="font-weight: 500; color: #6b705c;">Loading...</div>
        </div>

        <div class="buttons">
            <button onclick="generateNew()">NEW POST</button>
            <button class="copy-all-btn" onclick="copyEverything()">COPY CAPTION</button>
        </div>
    </div>

    <script>
        // Peaceful & Nature-focused quotes and songs
        const myQuotes = [
            { q: "Adopt the pace of nature: her secret is patience.", a: "Ralph Waldo Emerson", song: "Weightless - Marconi Union" },
            { q: "In every walk with nature one receives far more than he seeks.", a: "John Muir", song: "River Flows in You - Yiruma" },
            { q: "Silence is the element in which great things fashion themselves.", a: "Thomas Carlyle", song: "Clair de Lune - DeBussy" },
            { q: "Look deep into nature, and then you will understand everything better.", a: "Albert Einstein", song: "Experience - Ludovico Einaudi" },
            { q: "Peace begins with a smile.", a: "Mother Teresa", song: "Bloom - The Paper Kites" },
            { q: "The earth has music for those who listen.", a: "George Santayana", song: "Sunset Lover - Petit Biscuit" },
            { q: "Keep close to Nature's heart... and break clear away, once in a while.", a: "John Muir", song: "Airstream - Electra" }
        ];

        const hashtags = "\n\n#Quotesmotivatesme #PeacefulMind #NatureVibes #InnerPeace #SlowLiving #Mindfulness #ZenQuotes";

        function generateNew() {
            const randomIndex = Math.floor(Math.random() * myQuotes.length);
            const item = myQuotes[randomIndex];

            document.getElementById('quote').innerText = `"${item.q}"`;
            document.getElementById('author').innerText = item.a;

            const caption = `🌿 ${item.q}\n\nTake a deep breath and find your peace today. ✨\n\nFollow @Quotesmotivatesme for daily serenity.${hashtags}`;
            document.getElementById('caption-area').innerText = caption;
            document.getElementById('song-area').innerText = `🎵 Suggested: ${item.song}`;
        }

        function copyEverything() {
            const caption = document.getElementById('caption-area').innerText;
            navigator.clipboard.writeText(caption);
            
            const btn = document.querySelector('.copy-all-btn');
            btn.innerText = "COPIED!";
            setTimeout(() => { btn.innerText = "COPY CAPTION"; }, 2000);
        }

        generateNew();
    </script>
</body>
</html>
